version: "3.8"

services:
  mysqldb:
    image: mysql:8.0
    container_name: orchestra-db-container
    environment:
      MYSQL_ROOT_PASSWORD: admin1234 
      MYSQL_DATABASE: orchestra_db
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - orchestra-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: orchestra-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - orchestra-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: orchestra-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # INTERNAL network uses kafka:29092, EXTERNAL uses localhost:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - orchestra-network

  orchestra-app:
    build: .
    image: orchestra-backend
    container_name: orchestra-service
    restart: on-failure
    depends_on:
      - mysqldb
      - kafka
    environment:
      # These override your application.yml to use the Docker network names
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/orchestra_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8080:8080"
    networks:
      - orchestra-network

networks:
  orchestra-network:
    driver: bridge